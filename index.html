<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لـ ملاكي ❤️</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    text-align: center;
    color: white;
    background: linear-gradient(-45deg, #ff6a88, #ff99ac, #ff758c, #ff7eb3);
    background-size: 400% 400%;
    animation: bg 10s ease infinite;
}

@keyframes bg {
    0% {background-position:0% 50%;}
    50% {background-position:100% 50%;}
    100% {background-position:0% 50%;}
}

.container {
    padding: 30px 15px;
}

h1 { font-size: 10vw; }

.date {
    font-size: 6vw;
}

.names {
    font-size: 7vw;
    margin-top: 10px;
}

.counter-box {
    margin: 20px auto;
    padding: 15px;
    width: 90%;
    background: rgba(255,255,255,0.2);
    border-radius: 20px;
}

#counterText {
    font-size: 6vw;
    line-height: 1.6;
    font-weight: bold;
}

.message {
    font-size: 5.5vw;
    margin-top: 15px;
}

/* ❤️ أزرار القلوب */
.buttons {
    display: flex;
    justify-content: center;
    gap: 30px;
    margin-top: 20px;
}

.heart-btn {
    position: relative;
    width: 90px;
    height: 90px;
    background: #ff304f;
    border: none;
    transform: rotate(-45deg);
    cursor: pointer;
    animation: beat 1.2s infinite;
}

.heart-btn::before,
.heart-btn::after {
    content: "";
    position: absolute;
    width: 90px;
    height: 90px;
    background: #ff304f;
    border-radius: 50%;
}

.heart-btn::before { top: -45px; left: 0; }
.heart-btn::after { left: 45px; top: 0; }

.heart-btn span {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) rotate(45deg);
    color: white;
    font-size: 18px;
    z-index: 2;
}

@keyframes beat {
    0% { transform: rotate(-45deg) scale(1); }
    50% { transform: rotate(-45deg) scale(1.1); }
    100% { transform: rotate(-45deg) scale(1); }
}

#secretMessage {
    font-size: 6vw;
    margin-top: 10px;
}

#songMessage {
    font-size: 5vw;
    margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">

<h1>لـ ملاكي ❤️</h1>

<p class="date">💍 24.04.2026 — الساعة 4 العصر</p>

<div class="names" id="typing"></div>

<div class="counter-box">
    <div id="counterText"></div>
</div>

<div class="message">
يمكن الكلام ما يوصف قديش بحبك...  
بس كل يوم معك أحلى من اللي قبله 💕
</div>

<div class="buttons">
    <button class="heart-btn" onclick="openSong()">
        <span>اكبسي هون</span>
    </button>

    <button class="heart-btn" onclick="showSecret()">
        <span>اكبسي هون</span>
    </button>
</div>

<div id="songMessage"></div>
<div id="secretMessage"></div>

<!-- 🎵 الصوت -->
<audio id="song" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>

</div>

<script>
// ✍️ كتابة الاسم
let text = "Anas ❤️ Malak";
let i = 0;

function typeWriter(){
    if(i < text.length){
        document.getElementById("typing").innerHTML += text.charAt(i);
        i++;
        setTimeout(typeWriter, 90);
    }
}
typeWriter();

// ⏳ العداد
let startDate = new Date("2026-04-24T16:00:00");

function updateCounter() {
    let now = new Date();

    let years = now.getFullYear() - startDate.getFullYear();
    let months = now.getMonth() - startDate.getMonth();
    let days = now.getDate() - startDate.getDate();

    let hours = now.getHours() - startDate.getHours();
    let minutes = now.getMinutes() - startDate.getMinutes();
    let seconds = now.getSeconds() - startDate.getSeconds();

    if (seconds < 0) { seconds += 60; minutes--; }
    if (minutes < 0) { minutes += 60; hours--; }
    if (hours < 0) { hours += 24; days--; }
    if (days < 0) {
        let prevMonth = new Date(now.getFullYear(), now.getMonth(), 0);
        days += prevMonth.getDate();
        months--;
    }
    if (months < 0) { months += 12; years--; }

    document.getElementById("counterText").innerHTML =
        years + " سنة<br>" +
        months + " شهر<br>" +
        days + " يوم<br>" +
        hours + ":" + minutes + ":" + seconds;
}

setInterval(updateCounter, 1000);
updateCounter();

// 🎵 تشغيل الأغنية
let isPlaying = false;

function openSong() {
    let song = document.getElementById("song");
    let msg = document.getElementById("songMessage");

    if (!isPlaying) {
        song.play();
        msg.innerHTML = "هاي الأغنية لإلِك 💕";
        isPlaying = true;
    } else {
        song.pause();
        msg.innerHTML = "";
        isPlaying = false;
    }
}

// 🔒 مفاجأة
let step = 0;

function showSecret(){
    let msg = document.getElementById("secretMessage");

    if(step === 0){
        msg.innerHTML = "أنتي الحلوة ♥️♥️";
        step = 1;
    } else {
        msg.innerHTML = "أنتي حلوة مرة ثانية ♥️😊";
        step = 0;
    }
}
</script>

</body/html>
