<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>لـ ملاكي ❤️</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: Arial;
    text-align: center;
    color: white;
    background: linear-gradient(-45deg, #ff6a88, #ff99ac, #ff758c, #ff7eb3);
    background-size: 400% 400%;
    animation: bg 10s ease infinite;
}

@keyframes bg {
    0% {background-position:0% 50%;}
    50% {background-position:100% 50%;}
    100% {background-position:0% 50%;}
}

.container {
    position: relative;
    top: 50%;
    transform: translateY(-50%);
}

h1 {font-size:50px;}
.names {font-size:30px; margin-top:20px;}
.counter {margin-top:10px;}
.message {margin-top:20px;}

button {
    margin-top:15px;
    padding:12px 25px;
    border:none;
    border-radius:10px;
    background:white;
    color:#ff4b5c;
    font-size:16px;
    cursor:pointer;
}

button:hover {
    transform: scale(1.1);
}

/* الرسالة */
.secret {
    opacity: 0;
    transform: scale(0.5);
    transition: 0.6s;
    font-size: 28px;
    margin-top: 20px;
}

.show {
    opacity: 1;
    transform: scale(1.2);
}

.heart {
    position:absolute;
    color:red;
    animation:float 5s linear infinite;
}

@keyframes float {
    from {transform:translateY(100vh);}
    to {transform:translateY(-10vh); opacity:0;}
}
</style>

</head>

<body>

<div class="container">
    <h1>لـ ملاكي ❤️</h1>

    <p>💍 24.04.2026 — يوم ما صرتِ رسميًا إلي</p>

    <div class="names" id="typing"></div>

    <div class="counter" id="counter"></div>

    <div class="message">
        يمكن الكلام ما يوصف قديش بحبك...  
        بس كل يوم معك أحلى من اللي قبله 💕  
    </div>

    <button onclick="openSong()">اضغطي هون 🎵</button>
    <br>
    <button onclick="showSecret()">اضغطي لمفاجأة 🔒</button>

    <div id="secretMessage" class="secret"></div>
</div>

<script>
// 🎵 الأغنية
function openSong() {
    window.open("https://youtu.be/VkH3aMIWntw", "_blank");
}

// ✍️ كتابة الاسم
let text = "Anas ❤️ Malak";
let i = 0;
function typeWriter(){
    if(i < text.length){
        document.getElementById("typing").innerHTML += text.charAt(i);
        i++;
        setTimeout(typeWriter, 90);
    }
}
typeWriter();

// ⏳ عداد الأيام
let startDate = new Date("2026-04-24");
let diffDays = Math.floor((new Date() - startDate)/(1000*60*60*24));
document.getElementById("counter").innerHTML =
"صرلنا " + diffDays + " يوم مع بعض0❤️";

// 💖 قلوب
setInterval(()=>{
    let heart = document.createElement("div");
    heart.innerHTML="❤️";
    heart.className="heart";
    heart.style.left=Math.random()*100+"vw";
    document.body.appendChild(heart);
    setTimeout(()=>heart.remove(),5000);
},300);

// 🔒 مفاجأتين
let step = 0;
function showSecret(){
    let msg = document.getElementById("secretMessage");

    if(step === 0){
        msg.innerHTML = "أنتي لحلوه ♥️♥️";
        msg.classList.add("show");
        step = 1;
    } else {
        msg.innerHTML = "أنتي لحلوه للمره لثانيه ♥️😊";
        step = 0;
    }
}
</script>

</body>
</html>
